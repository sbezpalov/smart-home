        set domain "office.bezpalov.com"
        set type secondary
        set authoritative disable
        set forwarder "192.168.100.1" "192.168.100.3" "192.168.150.1" "192.168.150.3" 
        set source-ip 172.16.122.1
        set ip-primary 192.168.100.1
    next
    edit "home"
        set domain "home.bezpalov.com"
        set type secondary
        set authoritative disable
        set forwarder "172.16.122.254" "172.16.121.254" "172.16.120.2" 
        set source-ip 172.16.122.1
        set ip-primary 172.16.122.254
    next
    edit "home_reverse"
        set domain "122.16.172.in-addr.arpa"
        set type secondary
        set authoritative disable
        set forwarder "172.16.122.254" "172.16.121.254" "172.16.120.2" 
        set source-ip 172.16.122.1
        set ip-primary 172.16.122.254
    next
end
config system dns-server
